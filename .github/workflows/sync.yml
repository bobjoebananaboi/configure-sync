name: sync

on:
  workflow_dispatch:
    inputs:
      total_shards:
        required: true
        default: "10"
      skip_last_shard:
        required: false
        default: "false"
      mode:
        required: false
        default: "availability"
      shards:
        description: "Comma-separated shard indices to run (blank = all of them). Lets the app re-run only the shards a cancelled run never uploaded."
        required: false
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests cryptography beautifulsoup4
      - name: Crawl catalog + build SKU list
        if: ${{ github.event.inputs.mode != 'nla' }}
        run: python fetch.py collect --out-dir build
      - name: Decode NLA target list from secrets
        if: ${{ github.event.inputs.mode == 'nla' }}
        env:
          NLA_TARGETS_0: ${{ secrets.NLA_TARGETS_0 }}
          NLA_TARGETS_1: ${{ secrets.NLA_TARGETS_1 }}
          NLA_TARGETS_2: ${{ secrets.NLA_TARGETS_2 }}
          NLA_TARGETS_3: ${{ secrets.NLA_TARGETS_3 }}
          NLA_TARGETS_4: ${{ secrets.NLA_TARGETS_4 }}
        run: python fetch.py decode-nla --out-dir build
      - uses: actions/upload-artifact@v4
        with:
          name: index
          path: build/
      - id: m
        env:
          TOTAL: ${{ github.event.inputs.total_shards }}
          ONLY: ${{ github.event.inputs.shards }}
        # Normally spawn all `total_shards` work jobs. `shards` narrows that to a
        # subset, so the app can re-run just the shards a cancelled/failed run
        # never uploaded instead of redoing every one - sharding is deterministic
        # (crc32(sku) % total), so shard N always covers the same SKUs.
        # skip_last_shard only controls the (unused-by-the-app) merge job.
        run: echo "matrix=$(python -c 'import json,os; only=[int(x) for x in os.environ.get("ONLY","").replace(" ","").split(",") if x]; print(json.dumps(only or list(range(int(os.environ["TOTAL"])))))')" >> "$GITHUB_OUTPUT"

  work:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests cryptography beautifulsoup4
      - uses: actions/download-artifact@v4
        with:
          name: index
          path: build
      - run: >
          python fetch.py pull --in-dir build --out-dir parts
          --shard ${{ matrix.shard }} --total ${{ github.event.inputs.total_shards }}
          --key key_public.pem --mode ${{ github.event.inputs.mode }}
      - uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.shard }}
          path: parts/
