name: sync

on:
  workflow_dispatch:
    inputs:
      total_shards:
        required: true
        default: "10"
      skip_last_shard:
        required: false
        default: "false"
      mode:
        required: false
        default: "availability"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests cryptography beautifulsoup4
      - run: python fetch.py collect --out-dir build --mode ${{ github.event.inputs.mode }}
      - uses: actions/upload-artifact@v4
        with:
          name: index
          path: build/
      - id: m
        env:
          TOTAL: ${{ github.event.inputs.total_shards }}
        # Always spawn all `total_shards` work jobs - skip_last_shard only
        # controls whether the (unused-by-the-app) merge job runs below, it
        # does NOT reserve a shard for the caller anymore.
        run: echo "matrix=$(python -c 'import json,os; print(json.dumps(list(range(int(os.environ["TOTAL"])))))')" >> "$GITHUB_OUTPUT"

  work:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q requests cryptography beautifulsoup4
      - uses: actions/download-artifact@v4
        with:
          name: index
          path: build
      - run: >
          python fetch.py pull --in-dir build --out-dir parts
          --shard ${{ matrix.shard }} --total ${{ github.event.inputs.total_shards }}
          --key key_public.pem --mode ${{ github.event.inputs.mode }}
      - uses: actions/upload-artifact@v4
        with:
          name: part-${{ matrix.shard }}
          path: parts/
